<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo por Categorias - SP Comercial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --cor-primaria: #deff9a;
            --cor-fundo: #020617;
        }
        body { background-color: var(--cor-fundo); color: #f8fafc; }

        header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid #1e293b;
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
        }
       .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
       .logo-img {
            height: 70px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 20px; }

       .swiper { width: 100%; height: 180px; border-radius: 24px; margin-bottom: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

       .swiper-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
        }

       .slide-institucional {
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.85)), url('spcomercial.jpg');
            background-size: cover;
            background-position: center;
        }

       .slide-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover!important;
            background-position: center!important;
            filter: blur(12px) brightness(0.4);
            z-index: 1;
        }

       .slide-img-produto {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain!important;
            background-position: center!important;
            background-repeat: no-repeat!important;
            z-index: 2;
        }

       .swiper-slide span { font-size: 1.1rem; color: var(--cor-primaria); font-weight: normal; margin-top: 10px; letter-spacing: 1px; }

       .slide-detalhes-produto {
            background: rgba(2, 6, 23, 0.85);
            padding: 6px 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            margin-top: auto;
            margin-bottom: 5px;
            width: 85%;
            max-width: 380px;
            border: 1px solid #1e293b;
            z-index: 3;
        }
       .slide-detalhes-produto h4 { font-size: 1.1rem; margin-bottom: 2px; color: #fff; text-transform: capitalize; }
       .slide-detalhes-produto p { font-size: 1rem; color: var(--cor-primaria); font-weight: bold; }

       .oferta-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 3;
        }

       .section-title { font-size: 1.5rem; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

       .btn-voltar-fixo {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #334155;
            color: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #475569;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            font-size: 1rem;
        }

       .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
       .category-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; cursor: pointer; height: 200px; display: flex; align-items: flex-end; position: relative; }
       .cat-img-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
       .category-overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, rgba(2,6,23,0.7) 0%, transparent 60%); }
       .category-info { position: relative; padding: 25px; color: #fff; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }

        #productsDisplaySection { display: none; }

       .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
       .product-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; }
       .img-container { position: relative; width: 100%; height: 240px; background: #1e293b; cursor: pointer; }
       .product-img { width: 100%; height: 100%; object-fit: cover; }
       .product-info { padding: 20px; }
       .product-info h3 { font-size: 1rem; margin-bottom: 10px; min-height: 40px; }
       .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
       .product-footer span { font-size: 1.25rem; font-weight: bold; color: var(--cor-primaria); }

        /* CARRINHO */
       .btn-carrinho-add {
            background: var(--cor-primaria);
            color: #020617;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
       .btn-carrinho-add:hover { opacity: 0.8; transform: scale(1.05); }

       .carrinho-flutuante {
            position: fixed;
            bottom: 90px;
            right: 25px;
            background: var(--cor-primaria);
            color: #020617;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 99;
            transition: all 0.2s;
        }
       .carrinho-flutuante:active { transform: scale(0.9); }
       .carrinho-contador {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

       .overlay-fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 6, 23, 0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
       .overlay-fullscreen.ativo { display: flex; }
       .foto-fullscreen { max-width: 95%; max-height: 65vh; border-radius: 16px; object-fit: contain; }

       .detalhes-fullscreen { text-align: center; margin-top: 20px; max-width: 90%; }
       .detalhes-fullscreen h3 { font-size: 1.4rem; color: #fff; margin-bottom: 8px; }
       .detalhes-fullscreen p { font-size: 1.3rem; color: var(--cor-primaria); font-weight: bold; }

       .bolinha-fechar { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 2.5rem; color: #94a3b8; }
    /* MODAL CARRINHO */
.modal-carrinho {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(4px);
    display: flex; justify-content: center; align-items: center; z-index: 999;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-carrinho.ativo { opacity: 1; pointer-events: auto; }
.carrinho-card {
    background: #0f172a; border: 1px solid #1e293b; border-radius: 24px;
    width: 100%; max-width: 500px; max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.3s;
}
.modal-carrinho.ativo .carrinho-card { transform: scale(1); }
.carrinho-header {
    padding: 25px; border-bottom: 1px solid #1e293b;
    display: flex; justify-content: space-between; align-items: center;
}
.carrinho-header h2 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
.btn-fechar-carrinho { background: transparent; border: none; color: #64748b; font-size: 1.5rem; cursor: pointer; }
.carrinho-itens { flex-grow: 1; overflow-y: auto; padding: 20px; }
.item-carrinho {
    display: flex; gap: 15px; padding: 15px; background: #111827;
    border-radius: 12px; margin-bottom: 12px; border: 1px solid #1e293b;
}
.item-carrinho img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }
.item-carrinho-info { flex-grow: 1; }
.item-carrinho-info h4 { font-size: 0.95rem; margin-bottom: 5px; }
.item-carrinho-info p { color: var(--cor-primaria); font-weight: bold; font-size: 1.1rem; }
.item-carrinho-acoes { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.btn-qtd {
    background: #1e293b; border: 1px solid #334155; color: #fff;
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold;
}
.btn-qtd:hover { background: #334155; }
.btn-remover { background: #450a0a; border: 1px solid #7f1d1d; color: #f87171; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.carrinho-footer { padding: 25px; border-top: 1px solid #1e293b; }
.carrinho-total { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2rem; }
.carrinho-total strong { color: var(--cor-primaria); }
.btn-finalizar-wpp {
    width: 100%; background: #25d366; color: #fff; border: none; padding: 15px;
    border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-finalizar-wpp:hover { background: #20ba5a; }
.btn-finalizar-wpp:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
.carrinho-vazio { text-align: center; padding: 60px 20px; color: #64748b; }
.carrinho-vazio i { font-size: 3rem; margin-bottom: 15px; color: #334155; }
</style>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="logosp.jpg" alt="Logo SP Comercial" class="logo-img" onerror="this.onerror=null; this.src='logosp.jpeg';">
        </div>
    </header>

    <button class="btn-voltar-fixo" id="btnVoltarFixo" onclick="voltarCategorias()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
    </button>

    <main>
        <div class="swiper bannerSwiper">
            <div class="swiper-wrapper" id="carouselWrapper">
                <div class="swiper-slide slide-institucional" data-swiper-autoplay="6000">
                    Confira nossas promoções!
                    <span>Tudo para construir, reformar e decorar</span>
                </div>
                <div class="swiper-slide slide-institucional" data-swiper-autoplay="6000">
                    Qualidade em cada detalhe.
                    <span>Os melhores materiais de Ubatuba</span>
                </div>
            </div>
        </div>

        <div id="telaCategorias">
            <h2 class="section-title">Departamentos</h2>
            <section class="categories-grid" id="categoriesContainer"></section>
        </div>

        <div id="productsDisplaySection">
            <h2 class="section-title" id="selectedCategoryTitle"></h2>
            <section class="products-grid" id="publicProductsGrid"></section>
        </div>
    </main>

    <div class="overlay-fullscreen" id="telaCheiaOverlay">
        <div class="bolinha-fechar" onclick="fecharModoImersivo()"><i class="fa-solid fa-circle-xmark"></i></div>
        <img src="" id="imagemAmpliada" class="foto-fullscreen">
        <div class="detalhes-fullscreen">
            <h3 id="textoAmpliadoNome">Nome do Produto</h3>
            <p id="textoAmpliadoPreco">R$ 0,00</p>
        </div>
    </div>

    <div class="carrinho-flutuante" id="btnCarrinho" onclick="abrirCarrinho()">
        <i class="fa-solid fa-shopping-bag"></i>
        <span class="carrinho-contador" id="contadorCarrinho">0</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const supabasePub = window.supabase.createClient("https://xxxsxsernmaltunwyfaq.supabase.co", "sb_publishable_sQNMnxWafcK5iF6CCXFFXg_lhx2nTQ-");

        const NOME_CATEGORIA_OFERTAS = "Ofertas";
        let swiperInstance;
        let historicoTelas = ['categorias'];
        let whatsappVendedor = '5512997301639';
        const urlParams = new URLSearchParams(window.location.search);
        const vendedorSlug = urlParams.get('v');

        function initSwiper() {
            swiperInstance = new Swiper(".bannerSwiper", {
                spaceBetween: 30,
                centeredSlides: true,
                grabCursor: true,
                autoplay: {
                    delay: 6000,
                    disableOnInteraction: false,
                }
            });
        }

        async function loadShowcase() {
    try {
        // APLICA CONFIG DE APARÊNCIA DA LOJA
        const { data: config } = await supabasePub.from('config_loja').select('*').eq('id', 1).single();
        if (config) {
            document.documentElement.style.setProperty('--cor-primaria', config.cor_primaria);
            document.documentElement.style.setProperty('--cor-fundo', config.cor_fundo);
            document.querySelector('.logo-img').src = config.logo_url;
            document.title = config.nome_loja + ' - Catálogo';
        }

        // SE TEM VENDEDOR NA URL, BUSCA O WHATSAPP DELE
        if (vendedorSlug) {
            const { data: vendedor } = await supabasePub.from('vendedores').select('whatsapp_numero').eq('slug', vendedorSlug).single();
            if (vendedor?.whatsapp_numero) whatsappVendedor = vendedor.whatsapp_numero;
        }

        // PUXA CATEGORIAS E PRODUTOS COM IMAGENS
        const { data: categorias, error: errCat } = await supabasePub.from('categorias').select('*');
        const { data: produtos, error: errProd } = await supabasePub
         .from('produtos')
         .select('id, nome, preco, categoria_id, produto_imagens(url, ordem)');
         console.log('Produtos:', produtos);
         console.log('Erro produtos:', errProd);
         console.log('Categorias:', categorias);

        if (errCat || errProd) {
            console.error("Erro Supabase:", errCat || errProd);
        }

        const categoriaOfertaObjeto = categorias?.find(c => c.nome_categoria.toLowerCase().trim() === NOME_CATEGORIA_OFERTAS.toLowerCase().trim());

        if (categoriaOfertaObjeto && produtos) {
            const carouselWrapper = document.getElementById('carouselWrapper');
            const produtosFiltradosEmOferta = produtos.filter(p => p.categoria_id === categoriaOfertaObjeto.id);

            let slidesHTML = '';
            produtosFiltradosEmOferta.forEach(prod => {
                const primeiraImg = prod.produto_imagens?.sort((a,b) => a.ordem - b.ordem)[0]?.url || '';
                if (!primeiraImg) return; // Pula produto sem imagem

                const precoFormatado = prod.preco || 'Consulte';
                const nomeEscapado = prod.nome.replace(/'/g, "\\'");
                const precoEscapado = precoFormatado.replace(/'/g, "\\'");

                slidesHTML += `
                <div class="swiper-slide" data-swiper-autoplay="6000" style="cursor:pointer;" onclick="abrirModoImersivo('${primeiraImg}', '${nomeEscapado}', '${precoEscapado}')">
                    <div class="slide-bg-blur" style="background: url('${primeiraImg}');"></div>
                    <div class="slide-img-produto" style="background: url('${primeiraImg}');"></div>
                    <div class="oferta-tag"><i class="fa-solid fa-fire"></i> Oferta</div>
                    <div class="slide-detalhes-produto">
                        <h4>${prod.nome}</h4>
                        <p>${precoFormatado}</p>
                    </div>
                </div>`;
            });
            carouselWrapper.innerHTML += slidesHTML;
        }

        initSwiper();

        const container = document.getElementById('categoriesContainer');
        if (!categorias || categorias.length === 0) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Nenhum departamento cadastrado.</div>`;
            return;
        }

        const mapCategorias = categorias.filter(c => c.nome_categoria.toLowerCase().trim()!== NOME_CATEGORIA_OFERTAS.toLowerCase().trim());

        container.innerHTML = mapCategorias.map(cat => {
     const prods = produtos?.filter(p => p.categoria_id === cat.id) || [];

     // PEGA PRIMEIRO PRODUTO COM FOTO - OLHA NOS 2 LUGARES
     const produtoComFoto = prods.find(p =>
        (p.produto_imagens && p.produto_imagens.length > 0) || p.imagem_url
     );

     let urlImg = 'https://via.placeholder.com/400x200?text=' + encodeURIComponent(cat.nome_categoria);

     if (produtoComFoto) {
        // PRIORIDADE 1: produto_imagens do Storage
        if (produtoComFoto.produto_imagens?.length > 0) {
            const arquivo = produtoComFoto.produto_imagens.sort((a,b) => a.ordem - b.ordem)[0].url;
            urlImg = supabasePub.storage.from('PRODUTOS').getPublicUrl(arquivo).data.publicUrl;
         }
        // PRIORIDADE 2: imagem_url antiga
         else if (produtoComFoto.imagem_url) {
            urlImg = produtoComFoto.imagem_url;
         }
     }

     return `<div class="category-card" onclick="showCategoryProducts('${cat.id}', '${cat.nome_categoria}')">
                <img src="${urlImg}" class="cat-img-bg" onerror="this.src='https://via.placeholder.com/400x200?text=Sem+Foto'">
                <div class="category-overlay"></div>
                <div class="category-info"><h3>${cat.nome_categoria}</h3></div>
            </div>`;
}).join('');
    } catch (error) {
        console.error("Erro geral de carregamento:", error);
        document.getElementById('categoriesContainer').innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#ef4444;">Erro ao carregar. Verifique as policies do Supabase.</div>`;
        initSwiper();
    }
} 

function showCategoryProducts(id, nome) {
    document.getElementById('telaCategorias').style.display = 'none';
    document.getElementById('productsDisplaySection').style.display = 'block';
    document.getElementById('btnVoltarFixo').style.display = 'block';
    document.getElementById('selectedCategoryTitle').innerText = nome;
    historicoTelas.push('produtos');
    history.pushState({tela: 'produtos'}, '', '#produtos');
    renderProdutos(id);
}

        function voltarCategorias() {
            document.getElementById('telaCategorias').style.display = 'block';
            document.getElementById('productsDisplaySection').style.display = 'none';
            document.getElementById('btnVoltarFixo').style.display = 'none';
            historicoTelas.pop();
            history.pushState({tela: 'categorias'}, '', '#categorias');
        }

        window.addEventListener('popstate', function(event) {
            if (historicoTelas.length > 1) {
                voltarCategorias();
            } else {
                history.pushState(null, null, '#categorias');
            }
        });

       async function renderProdutos(catId) {
    try {
        const { data: produtos, error: errProd } = await supabasePub
       .from('produtos')
       .select('id, nome, preco, categoria_id, produto_imagens(url, ordem)')
       .eq('categoria_id', catId);

        if (errProd) console.error('Erro ao buscar produtos:', errProd);

        const grid = document.getElementById('publicProductsGrid');

        if(!produtos || produtos.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Nenhum produto cadastrado aqui ainda.</div>`;
            return;
        }

        grid.innerHTML = produtos.map(item => {
           const arquivoImg = item.produto_imagens?.sort((a,b) => a.ordem - b.ordem)[0]?.url;
const primeiraImg = arquivoImg
   ? supabasePub.storage.from('PRODUTOS').getPublicUrl(arquivoImg).data.publicUrl
    : 'https://via.placeholder.com/300x300?text=Sem+Imagem';
            const precoFormatado = item.preco || 'Consulte';
            const nomeEscapado = item.nome.replace(/'/g, "\\'");
            const precoEscapado = precoFormatado.replace(/'/g, "\\'");

            return `
            <div class="product-card">
                <div class="img-container" onclick="abrirModoImersivo('${primeiraImg}', '${nomeEscapado}', '${precoEscapado}')">
                    <img src="${primeiraImg}" class="product-img" alt="${item.nome}">
                </div>
                <div class="product-info">
                    <h3>${item.nome}</h3>
                    <div class="product-footer">
                        <span>${precoFormatado}</span>
                        <button class="btn-carrinho-add" onclick="addCarrinho(${item.id}, '${nomeEscapado}', '${precoEscapado}', '${primeiraImg}')">
                            <i class="fa-solid fa-plus"></i> Carrinho
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (error) {
        console.error("Erro ao renderizar produtos:", error);
    }
}

        function abrirModoImersivo(url, nome, preco) {
            document.getElementById('imagemAmpliada').src = url;
            document.getElementById('textoAmpliadoNome').innerText = nome;
            document.getElementById('textoAmpliadoPreco').innerText = preco;
            document.getElementById('telaCheiaOverlay').classList.add('ativo');
        }

        function fecharModoImersivo() {
            document.getElementById('telaCheiaOverlay').classList.remove('ativo');
        }

        // ===== SISTEMA CARRINHO =====
        // ===== SISTEMA CARRINHO =====
let carrinho = JSON.parse(localStorage.getItem('carrinhoSP')) || [];

function addCarrinho(id, nome, preco, img) {
    const itemExistente = carrinho.find(i => i.id === id);
    if (itemExistente) {
        itemExistente.qtd++;
    } else {
        carrinho.push({ id, nome, preco, img, qtd: 1 });
    }
    salvarCarrinho();

    const btn = document.getElementById('btnCarrinho');
    btn.style.display = 'flex';
    btn.style.transform = 'scale(1.2)';
    setTimeout(() => {
        btn.style.transform = 'scale(1)';
    }, 200);
}

function salvarCarrinho() {
    localStorage.setItem('carrinhoSP', JSON.stringify(carrinho));
    atualizarContador();
}

function atualizarContador() {
    const total = carrinho.reduce((sum, item) => sum + item.qtd, 0);
    document.getElementById('contadorCarrinho').innerText = total;
    document.getElementById('btnCarrinho').style.display = total > 0 ? 'flex' : 'none';
}

function abrirCarrinho() {
    renderizarCarrinho();
    document.getElementById('modalCarrinho').classList.add('ativo');
}

function fecharCarrinho() {
    document.getElementById('modalCarrinho').classList.remove('ativo');
}

function renderizarCarrinho() {
    const lista = document.getElementById('listaCarrinho');
    
    if (carrinho.length === 0) {
        lista.innerHTML = `
            <div class="carrinho-vazio">
                <i class="fa-solid fa-shopping-bag"></i>
                <p>Seu carrinho está vazio</p>
            </div>`;
        document.getElementById('totalCarrinho').innerText = 'R$ 0,00';
        document.getElementById('btnFinalizarWpp').disabled = true;
        return;
    }

    document.getElementById('btnFinalizarWpp').disabled = false;
    let totalGeral = 0;
    lista.innerHTML = carrinho.map((item, index) => {
        // Extrai valor numérico do preço "R$ 119,90/m²" ou "R$ 46,00"
        const precoNum = parseFloat(item.preco.replace(/[^0-9,]/g, '').replace(',', '.')) || 0;
        const subtotal = precoNum * item.qtd;
        totalGeral += subtotal;
        
        return `
        <div class="item-carrinho">
            <img src="${item.img}" alt="${item.nome}">
            <div class="item-carrinho-info">
                <h4>${item.nome}</h4>
                <p>${item.preco}</p>
                <div class="item-carrinho-acoes">
                    <button class="btn-qtd" onclick="alterarQtd(${index}, -1)">-</button>
                    <span>${item.qtd}</span>
                    <button class="btn-qtd" onclick="alterarQtd(${index}, 1)">+</button>
                    <button class="btn-remover" onclick="removerItem(${index})"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('totalCarrinho').innerText = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;
}

function alterarQtd(index, delta) {
    carrinho[index].qtd += delta;
    if (carrinho[index].qtd <= 0) {
        carrinho.splice(index, 1);
    }
    salvarCarrinho();
    renderizarCarrinho();
}

function removerItem(index) {
    carrinho.splice(index, 1);
    salvarCarrinho();
    renderizarCarrinho();
}

function finalizarWhatsApp() {
    if (carrinho.length === 0) return;
    
    let mensagem = `Olá! Gostaria de fazer um pedido:\n\n`;
    let totalGeral = 0;
    
    carrinho.forEach(item => {
        const precoNum = parseFloat(item.preco.replace(/[^0-9,]/g, '').replace(',', '.')) || 0;
        const subtotal = precoNum * item.qtd;
        totalGeral += subtotal;
        mensagem += `${item.qtd}x ${item.nome} - ${item.preco}\n`;
    });
    
    mensagem += `\n*Total: R$ ${totalGeral.toFixed(2).replace('.', ',')}*\n\nAguardo retorno!`;
    
    const link = `https://wa.me/${whatsappVendedor}?text=${encodeURIComponent(mensagem)}`;
    window.open(link, '_blank');
    
    // Limpa carrinho após enviar
    carrinho = [];
    salvarCarrinho();
    fecharCarrinho();
}

    <div class="modal-carrinho" id="modalCarrinho">

        <div class="carrinho-header">
            <h2><i class="fa-solid fa-shopping-bag"></i> Meu Carrinho</h2>
            <button class="btn-fechar-carrinho" onclick="fecharCarrinho()"><i class="fa-solid fa-xmark"></i></button>
        </div>
