<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo por Categorias - SP Comercial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
 :root {
    --cor-primaria: #deff9a;
    --cor-fundo: #020617;
}
body { background-color: var(--cor-fundo); color: #f8fafc; }
        
        /* CORREÇÃO DO TOPO: Espaçamento ideal para o logo aparecer perfeito */
        header { 
            background: rgba(15, 23, 42, 0.95); 
            border-bottom: 1px solid #1e293b; 
            padding: 10px 0; 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            backdrop-filter: blur(8px); 
        }
        .header-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        /* Tamanho otimizado para o logo redondo logosp.jpg no topo */
        .logo-img { 
            height: 70px; 
            width: auto; 
            object-fit: contain; 
            display: block;
        }
        
        main { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Carrossel Mantendo os 180px de Altura Conforme o Layout */
        .swiper { width: 100%; height: 180px; border-radius: 24px; margin-bottom: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .swiper-slide { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            font-size: 1.4rem; 
            font-weight: bold;
            text-align: center;
            padding: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
        }
        
        /* Fundo padrão para as duas primeiras frases institucionais */
        .slide-institucional {
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.85)), url('spcomercial.jpg');
            background-size: cover;
            background-position: center;
        }
        
        /* Efeito de Fundo Desfocado para Enquadrar o Produto sem Cortar */
        .slide-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover !important;
            background-position: center !important;
            filter: blur(12px) brightness(0.4);
            z-index: 1;
        }
        
        /* Imagem real do produto centralizada em tamanho correto */
        .slide-img-produto {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            z-index: 2;
        }
        
        .swiper-slide span { font-size: 1.1rem; color: var(--cor-primaria); font-weight: normal; margin-top: 10px; letter-spacing: 1px; }
        
        /* Detalhes do Produto flutuando sobre o carrossel */
        .slide-detalhes-produto {
            background: rgba(2, 6, 23, 0.85);
            padding: 6px 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            margin-top: auto;
            margin-bottom: 5px;
            width: 85%;
            max-width: 380px;
            border: 1px solid #1e293b;
            z-index: 3;
        }
        .slide-detalhes-produto h4 { font-size: 1.1rem; margin-bottom: 2px; color: #fff; text-transform: capitalize; }
        .slide-detalhes-produto p { font-size: 1rem; color: var(--cor-primaria); font-weight: bold; }

        .oferta-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 3;
        }

        .section-title { font-size: 1.5rem; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        /* Botão Voltar Fixo no Polegar */
        .btn-voltar-fixo {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #334155;
            color: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #475569;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            font-size: 1rem;
        }

        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .category-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; cursor: pointer; height: 200px; display: flex; align-items: flex-end; position: relative; }
        .cat-img-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .category-overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, rgba(2,6,23,0.7) 0%, transparent 60%); }
        .category-info { position: relative; padding: 25px; color: #fff; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        
        #productsDisplaySection { display: none; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .product-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; }
        .img-container { position: relative; width: 100%; height: 240px; background: #1e293b; cursor: pointer; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .product-footer span { font-size: 1.25rem; font-weight: bold; color: var(--cor-primaria); }
        .btn-whatsapp { background: #25d366; color: #fff; padding: 10px 15px; border-radius: 10px; text-decoration: none; font-weight: bold; }
        
        /* Modal de Visualização Imersiva */
        .overlay-fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 6, 23, 0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .overlay-fullscreen.ativo { display: flex; }
        .foto-fullscreen { max-width: 95%; max-height: 65vh; border-radius: 16px; object-fit: contain; }
        
        .detalhes-fullscreen { text-align: center; margin-top: 20px; max-width: 90%; }
        .detalhes-fullscreen h3 { font-size: 1.4rem; color: #fff; margin-bottom: 8px; }
        .detalhes-fullscreen p { font-size: 1.3rem; color: var(--cor-primaria); font-weight: bold; }
        
        .bolinha-fechar { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 2.5rem; color: #94a3b8; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
    <img src="logosp.jpg" 
         alt="Logo SP Comercial" 
         class="logo-img" 
         style="display: block; max-height: 70px; width: auto;" 
         onerror="this.onerror=null; this.src='logosp.jpeg';">
</div>
    </header>

    <button class="btn-voltar-fixo" id="btnVoltarFixo" onclick="voltarCategorias()">
        <i class="fa-solid fa-arrow-left"></i> Voltar
    </button>

    <main>
        <div class="swiper bannerSwiper">
            <div class="swiper-wrapper" id="carouselWrapper">
                <div class="swiper-slide slide-institucional" data-swiper-autoplay="6000">
                    Confira nossas promoções!
                    <span>Tudo para construir, reformar e decorar</span>
                </div>
                <div class="swiper-slide slide-institucional" data-swiper-autoplay="6000">
                    Qualidade em cada detalhe.
                    <span>Os melhores materiais de Ubatuba</span>
                </div>
            </div>
        </div>

        <div id="telaCategorias">
            <h2 class="section-title">Departamentos</h2>
            <section class="categories-grid" id="categoriesContainer"></section>
        </div>

        <div id="productsDisplaySection">
            <h2 class="section-title" id="selectedCategoryTitle"></h2>
            <section class="products-grid" id="publicProductsGrid"></section>
        </div>
    </main>

    <div class="overlay-fullscreen" id="telaCheiaOverlay">
        <div class="bolinha-fechar" onclick="fecharModoImersivo()"><i class="fa-solid fa-circle-xmark"></i></div>
        <img src="" id="imagemAmpliada" class="foto-fullscreen">
        <div class="detalhes-fullscreen">
            <h3 id="textoAmpliadoNome">Nome do Produto</h3>
            <p id="textoAmpliadoPreco">R$ 0,00</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const supabasePub = window.supabase.createClient("https://xxxsxsernmaltunwyfaq.supabase.co", "sb_publishable_sQNMnxWafcK5iF6CCXFFXg_lhx2nTQ-");

        const NOME_CATEGORIA_OFERTAS = "Ofertas"; 
        let swiperInstance;
        let historicoTelas = ['categorias'];
        let whatsappVendedor = '5512997301639'; // PADRÃO - troca pelo seu número principal
        const urlParams = new URLSearchParams(window.location.search);
        const vendedorSlug = urlParams.get('v');
        function initSwiper() {
            swiperInstance = new Swiper(".bannerSwiper", {
                spaceBetween: 30,
                centeredSlides: true,
                grabCursor: true,
                autoplay: {
                    delay: 6000,
                    disableOnInteraction: false,
                }
            });
        }

        async function loadShowcase() {
    try {
        // APLICA CONFIG DE APARÊNCIA DA LOJA
        const { data: config } = await supabasePub.from('config_loja').select('*').eq('id', 1).single();
        if (config) {
            document.documentElement.style.setProperty('--cor-primaria', config.cor_primaria);
            document.documentElement.style.setProperty('--cor-fundo', config.cor_fundo);
            document.querySelector('.logo-img').src = config.logo_url;
            document.title = config.nome_loja + ' - Catálogo';
        }

        // resto do código continua igual...
        // SE TEM VENDEDOR NA URL, BUSCA O WHATSAPP DELE
        if (vendedorSlug) {
            const { data: vendedor } = await supabasePub.from('vendedores').select('whatsapp_numero').eq('slug', vendedorSlug).single();
            if (vendedor?.whatsapp_numero) whatsappVendedor = vendedor.whatsapp_numero;
        }
                const { data: categorias } = await supabasePub.from('categorias').select('*');
                const { data: produtos } = await supabasePub.from('produtos').select('*');
                
                const categoriaOfertaObjeto = categorias ? categorias.find(c => c.nome_categoria.toLowerCase().trim() === NOME_CATEGORIA_OFERTAS.toLowerCase().trim()) : null;
                
                if (categoriaOfertaObjeto && produtos) {
                    const carouselWrapper = document.getElementById('carouselWrapper');
                    const produtosFiltradosEmOferta = produtos.filter(p => p.categoria_id === categoriaOfertaObjeto.id);
                    
                    let slidesHTML = '';
                    produtosFiltradosEmOferta.forEach(prod => {
                        const precoFormatado = prod.preco ? prod.preco : 'Consulte';
                        const nomeEscapado = prod.nome.replace(/'/g, "\\'");
                        const precoEscapado = precoFormatado.replace(/'/g, "\\'");
                        
                        slidesHTML += `
                        <div class="swiper-slide" data-swiper-autoplay="6000" style="cursor:pointer;" onclick="abrirModoImersivo('${prod.imagem_url}', '${nomeEscapado}', '${precoEscapado}')">
                            <div class="slide-bg-blur" style="background: url('${prod.imagem_url}');"></div>
                            <div class="slide-img-produto" style="background: url('${prod.imagem_url}');"></div>
                            <div class="oferta-tag"><i class="fa-solid fa-fire"></i> Oferta</div>
                            <div class="slide-detalhes-produto">
                                <h4>${prod.nome}</h4>
                                <p>${precoFormatado}</p>
                            </div>
                        </div>`;
                    });
                    carouselWrapper.innerHTML += slidesHTML;
                }
                
                initSwiper();

                const container = document.getElementById('categoriesContainer');
                if (!categorias) return;
                
                const mapCategorias = categorias.filter(c => c.nome_categoria.toLowerCase().trim() !== NOME_CATEGORIA_OFERTAS.toLowerCase().trim());

                container.innerHTML = mapCategorias.map(cat => {
                    const prods = produtos.filter(p => p.categoria_id === cat.id);
                    return `<div class="category-card" onclick="showCategoryProducts('${cat.id}', '${cat.nome_categoria}')">
                                <img src="${prods[0]?.imagem_url || ''}" class="cat-img-bg">
                                <div class="category-overlay"></div>
                                <div class="category-info"><h3>${cat.nome_categoria}</h3></div>
                            </div>`;
                }).join('');
            } catch (error) {
                console.error("Erro geral de carregamento:", error);
                initSwiper();
            }
        }

        function showCategoryProducts(id, nome) {
            document.getElementById('telaCategorias').style.display = 'none';
            document.getElementById('productsDisplaySection').style.display = 'block';
            document.getElementById('btnVoltarFixo').style.display = 'block';
            document.getElementById('selectedCategoryTitle').innerText = nome;
            historicoTelas.push('produtos');
            history.pushState({tela: 'produtos'}, '', '#produtos');
            renderProdutos(id);
        }

        function voltarCategorias() {
            document.getElementById('telaCategorias').style.display = 'block';
            document.getElementById('productsDisplaySection').style.display = 'none';
            document.getElementById('btnVoltarFixo').style.display = 'none';
            historicoTelas.pop();
            history.pushState({tela: 'categorias'}, '', '#categorias');
        }

        // BLOQUEIA O BOTÃO VOLTAR DO CELULAR DE SAIR DA PÁGINA
        window.addEventListener('popstate', function(event) {
            if (historicoTelas.length > 1) {
                voltarCategorias();
            } else {
                history.pushState(null, null, '#categorias');
            }
        });

        async function renderProdutos(catId) {
            try {
                const { data: produtos } = await supabasePub.from('produtos').select('*').eq('categoria_id', catId);
                const grid = document.getElementById('publicProductsGrid');
                
                if(!produtos || produtos.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Nenhum produto cadastrado aqui ainda.</div>`;
                    return;
                }

                grid.innerHTML = produtos.map(item => {
                    const precoFormatado = item.preco ? item.preco : 'Consulte';
                    const nomeEscapado = item.nome.replace(/'/g, "\\'");
                    const precoEscapado = precoFormatado.replace(/'/g, "\\'");

                    return `
                    <div class="product-card">
                        <div class="img-container" onclick="abrirModoImersivo('${item.imagem_url}', '${nomeEscapado}', '${precoEscapado}')">
                            <img src="${item.imagem_url}" class="product-img" alt="${item.nome}">
                        </div>
                        <div class="product-info">
                            <h3>${item.nome}</h3>
                            <div class="product-footer">
                                <span>${precoFormatado}</span>
                                <a href="https://wa.me/${whatsappVendedor}?text=Olá! Tenho interesse no produto: ${item.nome}" target="_blank" class="btn-whatsapp">
                                    <i class="fa-brands fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (error) {
                console.error("Erro ao renderizar produtos:", error);
            }
        }

        function abrirModoImersivo(url, nome, preco) {
            document.getElementById('imagemAmpliada').src = url;
            document.getElementById('textoAmpliadoNome').innerText = nome;
            document.getElementById('textoAmpliadoPreco').innerText = preco;
            document.getElementById('telaCheiaOverlay').classList.add('ativo');
        }

        function fecharModoImersivo() { 
            document.getElementById('telaCheiaOverlay').classList.remove('ativo'); 
        }

        loadShowcase();
    </script>
</body>
</html>
