<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo por Categorias - SP Comercial</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #020617; color: #f8fafc; min-height: 100vh; }
        header { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #1e293b; padding: 20px; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 1.4rem; color: #f8fafc; }
        .logo h1 span { color: #deff9a; }
        main { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .banner { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 40px; border-radius: 24px; margin-bottom: 45px; text-align: center; }
        .section-title { font-size: 1.5rem; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .category-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; cursor: pointer; height: 200px; display: flex; align-items: flex-end; position: relative; }
        .cat-img-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .category-overlay { position: absolute; width: 100%; height: 100%; background: linear-gradient(to top, #020617 20%, transparent 100%); }
        .category-info { position: relative; padding: 25px; color: #fff; font-weight: 600; }
        
        /* Novas Classes de Controle */
        #productsDisplaySection { display: none; }
        .btn-voltar { background: #334155; color: white; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; margin-bottom: 20px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .product-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; overflow: hidden; }
        .img-container { position: relative; width: 100%; height: 240px; background: #1e293b; cursor: pointer; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn-whatsapp { background: #25d366; color: #fff; padding: 10px 15px; border-radius: 10px; text-decoration: none; }
        
        .overlay-fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 6, 23, 0.98); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .overlay-fullscreen.ativo { display: flex; }
        .foto-fullscreen { max-width: 90%; max-height: 85vh; border-radius: 16px; }
        .bolinha-fechar { position: absolute; bottom: 40px; cursor: pointer; font-size: 2rem; }
    </style>
</head>
<body>
    <header><div class="header-container"><div class="logo"><h1>SP <span>Comercial</span></h1></div></div></header>
    <main>
        <div id="telaCategorias">
            <section class="banner"><h2>Navegue por Categorias</h2></section>
            <h2 class="section-title">Departamentos</h2>
            <section class="categories-grid" id="categoriesContainer"></section>
        </div>

        <div id="productsDisplaySection">
            <button class="btn-voltar" onclick="voltarCategorias()"><i class="fa-solid fa-arrow-left"></i> Voltar para Categorias</button>
            <h2 class="section-title" id="selectedCategoryTitle"></h2>
            <section class="products-grid" id="publicProductsGrid"></section>
        </div>
    </main>

    <div class="overlay-fullscreen" id="telaCheiaOverlay">
        <img src="" id="imagemAmpliada" class="foto-fullscreen">
        <div class="bolinha-fechar" onclick="fecharModoImersivo()"><i class="fa-solid fa-circle-xmark"></i></div>
    </div>

    <script>
        const supabasePub = window.supabase.createClient("https://xxxsxsernmaltunwyfaq.supabase.co", "sb_publishable_sQNMnxWafcK5iF6CCXFFXg_lhx2nTQ-");

        async function loadShowcase() {
            const { data: categorias } = await supabasePub.from('categorias').select('*');
            const { data: produtos } = await supabasePub.from('produtos').select('*');
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = categorias.map(cat => {
                const prods = produtos.filter(p => p.categoria_id === cat.id);
                return `<div class="category-card" onclick="showCategoryProducts('${cat.id}', '${cat.nome_categoria}')">
                            <img src="${prods[0]?.imagem_url || ''}" class="cat-img-bg">
                            <div class="category-overlay"></div>
                            <div class="category-info"><h3>${cat.nome_categoria}</h3></div>
                        </div>`;
            }).join('');
        }

        function showCategoryProducts(id, nome) {
            document.getElementById('telaCategorias').style.display = 'none';
            document.getElementById('productsDisplaySection').style.display = 'block';
            document.getElementById('selectedCategoryTitle').innerText = nome;
            renderProdutos(id);
        }

        function voltarCategorias() {
            document.getElementById('telaCategorias').style.display = 'block';
            document.getElementById('productsDisplaySection').style.display = 'none';
        }

        async function renderProdutos(catId) {
            const { data: produtos } = await supabasePub.from('produtos').select('*').eq('categoria_id', catId);
            const grid = document.getElementById('publicProductsGrid');
            grid.innerHTML = produtos.map((item, index) => `
                <div class="product-card">
                    <div class="img-container" onclick="abrirModoImersivo('${item.imagem_url}')">
                        <img src="${item.imagem_url}" class="product-img">
                    </div>
                    <div class="product-info"><h3>${item.nome}</h3>
                        <div class="product-footer"><span>${item.preco}</span>
                        <a href="https://wa.me/5512999999999?text=Olá, quero o produto ${item.nome}" class="btn-whatsapp"><i class="fa-brands fa-whatsapp"></i></a></div>
                    </div>
                </div>`).join('');
        }

        function abrirModoImersivo(url) {
            document.getElementById('imagemAmpliada').src = url;
            document.getElementById('telaCheiaOverlay').classList.add('ativo');
        }
        function fecharModoImersivo() { document.getElementById('telaCheiaOverlay').classList.remove('ativo'); }

        loadShowcase();
    </script>
</body>
</html>
