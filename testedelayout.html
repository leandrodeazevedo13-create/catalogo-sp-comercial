<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Layout Imersivo - Bolinha Líquida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #020617; color: #f8fafc; padding: 40px 20px; min-height: 100vh; }

        h2 { text-align: center; margin-bottom: 30px; color: #fff; }

        /* Grid de Teste simulando seu catálogo */
        .grid-teste {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card do seu produto atual */
        .card-produto {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Container da Imagem com posição relativa */
        .container-foto {
            position: relative;
            width: 100%;
            height: 240px;
            background: #1e293b;
            overflow: hidden;
        }

        .container-foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 💧 Pequena Bolinha Líquida Discreta no Canto Inferior Direito */
        .bolinha-expandir {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        /* 🛠️ CORREÇÃO IMPORTANTE: Impede o ícone de engolir o clique do botão */
        .bolinha-expandir i {
            pointer-events: none;
        }

        /* Efeito de água expandindo de leve no hover */
        .bolinha-expandir:hover {
            transform: scale(1.15);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 12px rgba(222, 255, 154, 0.6);
            border-color: #deff9a;
        }

        .info-produto { padding: 15px; }
        .info-produto h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .info-produto p { color: #deff9a; font-weight: bold; }

        /* ========================================================
           💻 LAYOUT TELA CHEIA IMERSIVO (IGUAL AO DO VINÍLICO)
        =========================================================== */
        .overlay-fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            display: none; /* Oculto por padrão */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .overlay-fullscreen.ativo {
            display: flex;
            opacity: 1;
        }

        /* Foto principal ocupando a tela inteira com bordas suaves */
        .foto-fullscreen {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            user-select: none;
        }

        /* 💧 Bolinha de Controle centralizada abaixo para Sair/Voltar */
        .bolinha-fechar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5),
                        inset 0 4px 8px rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            z-index: 1010;
        }

        /* Correção também na bolinha de fechar */
        .bolinha-fechar i {
            pointer-events: none;
        }

        .bolinha-fechar:hover {
            transform: translateX(-50%) scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            border-color: #f87171; /* Vermelho sutil no hover de fechar */
        }

        /* Setas discretas laterais de navegação */
        .seta-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 2.5rem;
            cursor: pointer;
            padding: 20px;
            transition: color 0.2s;
            z-index: 1005;
        }
        .seta-nav:hover { color: #fff; }
        .seta-esq { left: 20px; }
        .seta-dir { right: 20px; }
    </style>
</head>
<body>

    <h2>Protótipo de Teste: Modo Imersivo</h2>

    <div class="grid-teste">
        <div class="card-produto">
            <div class="container-foto">
                <img src="https://images.unsplash.com/photo-1581881067989-7e3eaf45f4f6?q=80&w=600&auto=format&fit=crop" class="img-alvo" alt="Vinílico Rústico A">
                <div class="bolinha-expandir" onclick="abrirModoImersivo(0)" title="Ver em tela cheia">
                    <i class="fa-solid fa-expand"></i>
                </div>
            </div>
            <div class="info-produto">
                <h3>Vinílico Rústico A</h3>
                <p>R$ 120,00 / m²</p>
            </div>
        </div>

        <div class="card-produto">
            <div class="container-foto">
                <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=600&auto=format&fit=crop" class="img-alvo" alt="Laminado Premium">
                <div class="bolinha-expandir" onclick="abrirModoImersivo(1)" title="Ver em tela cheia">
                    <i class="fa-solid fa-expand"></i>
                </div>
            </div>
            <div class="info-produto">
                <h3>Laminado Premium</h3>
                <p>R$ 145,00 / m²</p>
            </div>
        </div>

        <div class="card-produto">
            <div class="container-foto">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=600&auto=format&fit=crop" class="img-alvo" alt="Porcelanato Dark">
                <div class="bolinha-expandir" onclick="abrirModoImersivo(2)" title="Ver em tela cheia">
                    <i class="fa-solid fa-expand"></i>
                </div>
            </div>
            <div class="info-produto">
                <h3>Porcelanato Dark</h3>
                <p>R$ 189,90 / m²</p>
            </div>
        </div>
    </div>

    <div class="overlay-fullscreen" id="telaCheiaOverlay">
        <button class="seta-nav seta-esq" onclick="mudarFoto(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        
        <img src="" id="imagemAmpliada" class="foto-fullscreen" alt="Visualização">
        
        <button class="seta-nav seta-dir" onclick="mudarFoto(1)"><i class="fa-solid fa-chevron-right"></i></button>

        <div class="bolinha-fechar" onclick="fecharModoImersivo()" title="Voltar ao catálogo">
            <i class="fa-solid fa-compress"></i>
        </div>
    </div>

    <script>
        const imagensProdutos = document.querySelectorAll('.img-alvo');
        const overlay = document.getElementById('telaCheiaOverlay');
        const imgAmpliada = document.getElementById('imagemAmpliada');
        
        let indiceAtual = 0;

        // Função para abrir a tela cheia pura
        function abrirModoImersivo(index) {
            indiceAtual = index;
            atualizarImagemFullscreen();
            overlay.classList.add('ativo');
        }

        // Função para fechar e voltar
        function fecharModoImersivo() {
            overlay.classList.remove('ativo');
        }

        // Navegar entre os produtos
        function mudarFoto(direcao) {
            indiceAtual += direcao;
            
            if (indiceAtual >= imagensProdutos.length) {
                indiceAtual = 0;
            } else if (indiceAtual < 0) {
                indiceAtual = imagensProdutos.length - 1;
            }
            
            atualizarImagemFullscreen();
        }

        function atualizarImagemFullscreen() {
            const novaUrl = imagensProdutos[indiceAtual].src;
            imgAmpliada.src = novaUrl;
        }

        // Atalhos de Teclado (ESC e Setas)
        document.addEventListener('keydown', (e) => {
            if (!overlay.classList.contains('ativo')) return;
            
            if (e.key === 'Escape') fecharModoImersivo();
            if (e.key === 'ArrowRight') mudarFoto(1);
            if (e.key === 'ArrowLeft') mudarFoto(-1);
        });
    </script>
</body>
</html>
